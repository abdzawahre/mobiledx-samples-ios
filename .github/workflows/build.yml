name: Build iOS Simulator App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: List Available Simulators
        run: |
          xcrun simctl list devices

      - name: Remove Firebase plist
        run: |
          rm -f GCMessengerSDKSample/GCMessengerSDKSample/GoogleService-Info.plist

      - name: Install CocoaPods Dependencies
        run: |
          cd GCMessengerSDKSample
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Fix Pod Deployment Targets
        run: |
          find GCMessengerSDKSample/Pods -name "*.xcconfig" -exec \
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} \;

      - name: Install SwiftLint
        run: |
          brew install swiftlint

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace GCMessengerSDKSample/GCMessengerSDKSample.xcworkspace \
            -scheme GCMessengerSDKSample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Verify Build Output
        run: |
          find build -name "*.app"

      - name: Create ZIP for Appetize
        run: |
          APP_PATH=$(find build -name "GCMessengerSDKSample.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "App bundle not found!"
            exit 1
          fi

          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/GCMessengerSDKSample-simulator.zip" "GCMessengerSDKSample.app"

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: GCMessengerSDKSample-simulator
          path: GCMessengerSDKSample-simulator.zip
          retention-days: 7
