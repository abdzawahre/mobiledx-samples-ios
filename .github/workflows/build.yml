name: Build iOS Simulator App
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd GCMessengerSDKSample
          pod install --repo-update

      - name: Build for Simulator
        run: |
          xcodebuild \
            -workspace GCMessengerSDKSample/GCMessengerSDKSample.xcworkspace \
            -scheme GCMessengerSDKSample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip .app for Appetize
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../GCMessengerSDKSample-simulator.zip GCMessengerSDKSample.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GCMessengerSDKSample-simulator
          path: GCMessengerSDKSample-simulator.zip
          retention-days: 7
