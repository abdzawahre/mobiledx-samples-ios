name: Build iOS Simulator App
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install iOS 18 Simulator Runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Remove Firebase plist
        run: rm -f GCMessengerSDKSample/GCMessengerSDKSample/GoogleService-Info.plist

      - name: Install CocoaPods
        run: |
          cd GCMessengerSDKSample
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Fix pod deployment targets
        run: |
          find GCMessengerSDKSample/Pods -name "*.xcconfig" | xargs sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g'

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build for Simulator
        run: |
          xcodebuild \
            -workspace GCMessengerSDKSample/GCMessengerSDKSample.xcworkspace \
            -scheme GCMessengerSDKSample \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Zip .app for Appetize
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../GCMessengerSDKSample-simulator.zip GCMessengerSDKSample.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GCMessengerSDKSample-simulator
          path: GCMessengerSDKSample-simulator.zip
          retention-days: 7
